services:
  backend:
    container_name: backend
    build: ./backend
    pull_policy: build
    ports:
      - "8081:8080"
    environment:
      - PORT=8080
      - HOSTNAME=0.0.0.0
      - INIT_PASSWORD=INIT-PASSWORD-TEST-FOR-LOCAL-DEV
      - CLIENT_URLS=http://frontend:3000,http://localhost:3000
    env_file:
      - 'env/pg.env'
      - 'env/.env'
  frontend:
    container_name: frontend
    build: ./frontend
    pull_policy: build
    ports:
      - "3000:80"

  database:
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    env_file:
      - 'env/pg.env'
