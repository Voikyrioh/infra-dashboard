# Reusable workflow — called by app repos via `uses: voikyrioh/dashboard/.github/workflows/build-deploy.yml@main`
# The dashboard detects repositories calling this workflow via GitHub Search API.

name: Build & Deploy (reusable)

on:
  workflow_call:
    inputs:
      app-name:
        description: "App name — used for Docker image tag and SSH deploy path"
        required: true
        type: string
      tag:
        description: "Version tag (ex: v1.0.0)"
        required: true
        type: string
    secrets:
      SSH_PRIVATE_KEY:
        required: true
      SSH_HOST:
        required: true
      SSH_PORT:
        required: true
      SSH_USER:
        required: true
      SSH_HOST_FINGERPRINT:
        required: true

jobs:
  create_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Validate tag format
        run: |
          if ! echo "${{ inputs.tag }}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: tag must match vX.Y.Z (e.g. v1.0.0)"
            exit 1
          fi
      - uses: actions/checkout@v4
      - name: Create GitHub release
        run: |
          gh release create "${{ inputs.tag }}" \
            --repo="$GITHUB_REPOSITORY" \
            --title="${{ inputs.app-name }} ${{ inputs.tag }}" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish_image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ inputs.app-name }}:${{ inputs.tag }}
            ghcr.io/${{ github.repository_owner }}/${{ inputs.app-name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [create_release, publish_image]
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "${{ secrets.SSH_HOST_FINGERPRINT }}" >> ~/.ssh/known_hosts
      - name: Deploy to VPS
        env:
          APP_TAG: ${{ inputs.tag }}
          APP_NAME: ${{ inputs.app-name }}
        run: |
          ssh -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "APP_TAG='$APP_TAG' APP_NAME='$APP_NAME' bash -s" << 'REMOTE'
            cd /opt/infra/apps/"$APP_NAME"
            grep -q '^IMAGE_TAG=' .env && \
              sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=$APP_TAG|" .env || \
              echo "IMAGE_TAG=$APP_TAG" >> .env
            docker compose pull
            docker compose up -d --remove-orphans
          REMOTE
      - name: Cleanup SSH
        if: always()
        run: rm -rf ~/.ssh
