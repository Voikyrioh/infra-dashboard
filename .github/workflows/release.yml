name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag (ex: v1.0.0)"
        required: true

jobs:
  create_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Validate tag format
        run: |
          if ! echo "${{ inputs.tag }}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: tag must match vX.Y.Z (e.g. v1.0.0)"
            exit 1
          fi
      - uses: actions/checkout@v4
      - name: Create GitHub release
        run: |
          gh release create "${{ inputs.tag }}" \
            --repo="$GITHUB_REPOSITORY" \
            --title="Dashboard ${{ inputs.tag }}" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish_backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/voikyrioh/dashboard-api:${{ inputs.tag }}
            ghcr.io/voikyrioh/dashboard-api:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  publish_frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/voikyrioh/dashboard-frontend:${{ inputs.tag }}
            ghcr.io/voikyrioh/dashboard-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    needs: [create_release, publish_backend, publish_frontend]
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "${{ secrets.SSH_HOST_FINGERPRINT }}" >> ~/.ssh/known_hosts
      - name: Deploy to VPS
        run: |
          ssh -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd /opt/infra/apps/dashboard
            grep -q '^IMAGE_TAG=' .env && \
              sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${{ inputs.tag }}/" .env || \
              echo "IMAGE_TAG=${{ inputs.tag }}" >> .env
            docker compose pull
            docker compose up -d --remove-orphans
          EOF
      - name: Cleanup SSH
        if: always()
        run: rm -rf ~/.ssh
