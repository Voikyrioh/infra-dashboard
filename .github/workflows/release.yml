name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag (ex: v1.0.0)"
        required: true

jobs:
  create_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub release
        run: |
          gh release create "${{ inputs.tag }}" \
            --repo="$GITHUB_REPOSITORY" \
            --title="Dashboard ${{ inputs.tag }}" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish_backend:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t ghcr.io/voikyrioh/dashboard-api:${{ inputs.tag }} ./backend
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Push backend image
        run: docker push ghcr.io/voikyrioh/dashboard-api:${{ inputs.tag }}

  publish_frontend:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Build frontend image
        run: docker build -t ghcr.io/voikyrioh/dashboard-frontend:${{ inputs.tag }} ./frontend
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Push frontend image
        run: docker push ghcr.io/voikyrioh/dashboard-frontend:${{ inputs.tag }}

  deploy:
    needs: [publish_backend, publish_frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
      - name: Deploy to VPS
        run: |
          ssh -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd /opt/infra/apps/dashboard
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${{ inputs.tag }}/" .env
            docker compose pull
            docker compose up -d --remove-orphans
          EOF
      - name: Cleanup SSH
        if: always()
        run: rm -rf ~/.ssh
