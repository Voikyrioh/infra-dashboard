services:
  dashboard-api:
    image: ghcr.io/voikyrioh/dashboard-api:${IMAGE_TAG:-latest}
    container_name: dashboard_api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=8080
      - HOSTNAME=0.0.0.0
      - RP_ID=dashboard.voikyrioh.fr
      - PRIVATE_KEY=/data/ssl/id_rsa
      - PUBLIC_KEY=/data/ssl/id_rsa.pub
      - JWT_EXPIRATION_TIME_MS=${JWT_EXPIRATION_TIME_MS:-3600000}
      - INIT_PASSWORD=${INIT_PASSWORD}
      - CLIENT_URLS=https://dashboard.voikyrioh.fr
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - PG_HOST=shared_postgres
      - PG_PORT=5432
      - PG_USER=${PG_USER}
      - PG_PASSWORD=${PG_PASSWORD}
      - PG_DATABASE=${PG_DATABASE:-dashboard}
      - LOG_FILE=/data/logs/app.log
    volumes:
      - dashboard-data:/data
      - /opt/dashboard/ssl:/data/ssl:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - dashboard
      - postgres

  dashboard-ui:
    image: ghcr.io/voikyrioh/dashboard-frontend:${IMAGE_TAG:-latest}
    container_name: dashboard_ui
    restart: unless-stopped
    depends_on:
      - dashboard-api
    networks:
      - dashboard
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.dashboard.rule=Host(`dashboard.voikyrioh.fr`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=cloudflare"
      - "traefik.http.services.dashboard.loadbalancer.server.port=80"
      - "traefik.http.routers.dashboard.middlewares=secure-headers@file"

networks:
  dashboard:
    internal: true
  proxy:
    external: true
  postgres:
    external: true

volumes:
  dashboard-data:
